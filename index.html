  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"88977501-b66b-4d9a-8737-6edb9ae5b8f1\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  body { margin:0; background:#e9e8e6; -webkit-font-smoothing:antialiased; }\n  a { color:#007AFF; text-decoration:none; }\n  a:hover { color:#0060df; }\n  @keyframes spin { to { transform:rotate(360deg); } }\n  @keyframes scrIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }\n  @keyframes pulse { 0%,100% { transform:scale(1); box-shadow:0 0 0 0 rgba(52,199,89,0.25); } 50% { transform:scale(1.05); box-shadow:0 0 0 22px rgba(52,199,89,0); } }\n  @keyframes ring { 0% { transform:scale(0.6); opacity:0.5; } 100% { transform:scale(1.9); opacity:0; } }\n  @keyframes scanline { 0% { top:6%; } 100% { top:90%; } }\n<\u002Fstyle>\n<script src=\"7e32a12d-2180-43f7-8d9c-8ee75b078598\"><\u002Fscript>\n<script src=\"660d6af8-a9e8-4b77-a3a2-c46b0506ede3\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:28px;background:radial-gradient(120% 120% at 50% 0%,#f0efed,#e4e3e0);\">\n  <div style=\"position:relative;width:416px;height:872px;background:#0a0a0b;border-radius:56px;box-sizing:border-box;padding:13px;box-shadow:0 50px 100px rgba(0,0,0,0.45), 0 0 0 2px #26262a inset, 0 0 0 8px #050506;\">\n    <div style=\"position:relative;width:390px;height:846px;border-radius:44px;overflow:hidden;background:#fff;\">\n\n      <!-- ============ HOME ============ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;padding:64px 26px 22px;box-sizing:border-box;animation:scrIn .3s ease;\">\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;\">\n            <svg width=\"64\" height=\"64\" sc-camel-view-box=\"0 0 24 24\" fill=\"#007AFF\"><path d=\"M12 2l8 3.2v6.3c0 4.9-3.3 8.9-8 10.2-4.7-1.3-8-5.3-8-10.2V5.2L12 2z\"><\u002Fpath><path d=\"M12 4.2v16.9c3.4-1.2 5.8-4.3 5.8-8.1V6.4L12 4.2z\" fill=\"#fff\" fill-opacity=\"0.3\"><\u002Fpath><\u002Fsvg>\n            <div style=\"font:800 41px/1 -apple-system,system-ui;color:#000;letter-spacing:-1.2px;margin-top:16px;\">Emergency List<\u002Fdiv>\n            <div style=\"font:400 19px/1.35 -apple-system,system-ui;color:#8A8A8E;margin-top:14px;max-width:300px;\">If your phone is gone, any iPhone can reach your people.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:100%;display:flex;flex-direction:column;gap:13px;\">\n            <button sc-camel-on-click=\"{{ onLost }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:15px;padding:19px 20px;border-radius:20px;box-sizing:border-box;background:linear-gradient(180deg,#FF5049,#F4342A);box-shadow:0 10px 24px rgba(244,52,42,0.35);\">\n              <svg width=\"30\" height=\"30\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\"><rect x=\"6\" y=\"2.5\" width=\"12\" height=\"19\" rx=\"3\"><\u002Frect><line x1=\"4.5\" y1=\"2.5\" x2=\"19.5\" y2=\"21.5\"><\u002Fline><\u002Fsvg>\n              <div style=\"flex:1;\">\n                <div style=\"font:700 20px -apple-system,system-ui;color:#fff;\">I lost my phone<\u002Fdiv>\n                <div style=\"font:400 15px/1.3 -apple-system,system-ui;color:rgba(255,255,255,0.92);margin-top:3px;\">Use this iPhone to call your emergency contacts<\u002Fdiv>\n              <\u002Fdiv>\n              <svg width=\"10\" height=\"18\" sc-camel-view-box=\"0 0 10 18\" fill=\"none\" stroke=\"rgba(255,255,255,0.85)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 1l7 8-7 8\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onSetup }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:15px;padding:19px 20px;border-radius:20px;box-sizing:border-box;background:linear-gradient(180deg,#3A9BFF,#0A7BF0);box-shadow:0 10px 24px rgba(10,123,240,0.32);\">\n              <svg width=\"30\" height=\"32\" sc-camel-view-box=\"0 0 24 26\" fill=\"none\"><path d=\"M12 1l9 3.5v7c0 5.5-3.7 10-9 11.4C6.7 21.5 3 17 3 11.5v-7L12 1z\" fill=\"#fff\"><\u002Fpath><path d=\"M8 12.5l2.7 2.8L16 9.5\" stroke=\"#0A84FF\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <div style=\"flex:1;\">\n                <div style=\"font:700 20px -apple-system,system-ui;color:#fff;\">You're protected<\u002Fdiv>\n                <div style=\"font:400 15px/1.3 -apple-system,system-ui;color:rgba(255,255,255,0.92);margin-top:3px;\">Your three contacts are registered. Tap to edit<\u002Fdiv>\n              <\u002Fdiv>\n              <svg width=\"10\" height=\"18\" sc-camel-view-box=\"0 0 10 18\" fill=\"none\" stroke=\"rgba(255,255,255,0.85)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 1l7 8-7 8\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"width:100%;text-align:center;font:400 13px -apple-system,system-ui;color:#B2B2B6;margin:16px 0 12px;\">{{ demoIdentityLine }}<\u002Fdiv>\n          <sc-if value=\"{{ showDemo }}\" hint-placeholder-val=\"{{ true }}\">\n            <button sc-camel-on-click=\"{{ onDemo }}\" style=\"all:unset;cursor:pointer;box-sizing:border-box;width:100%;text-align:center;padding:13px;border-radius:15px;border:1.5px solid rgba(175,82,222,0.35);background:rgba(175,82,222,0.07);font:600 15px -apple-system,system-ui;color:#AF52DE;\">{{ demoLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n          <button sc-camel-on-click=\"{{ onOpenLive }}\" style=\"all:unset;cursor:pointe  -apple-system,system-ui;color:#8A8A8E;margin-top:2px;\">{{ famLocSub }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"position:absolute;bottom:0;left:70px;right:0;height:0.5px;background:rgba(60,60,67,0.1);\"><\u002Fdiv>\n                <\u002Fbutton>\n                <button sc-camel-on-click=\"{{ onFamCallback }}\" style=\"all:unset;cursor:pointer;box-sizing:border-box;width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;\">\n                  <div style=\"width:38px;height:38px;border-radius:10px;background:#E9F9EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"#34C759\"><path d=\"M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.3 1L6.6 10.8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1;text-align:left;font:600 17px -apple-system,system-ui;color:#000;\">Ring the borrowed phone back<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font:400 13px/1.4 -apple-system,system-ui;color:rgba(60,60,67,0.55);padding:9px 30px 0;\">Sharing location asks this phone for GPS. If it's blocked, drop a manual pin instead.<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ famClosed }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"margin:24px 16px;text-align:center;\">\n                <div style=\"width:72px;height:72px;border-radius:50%;background:#34C759;display:inline-flex;align-items:center;justify-content:center;\"><svg width=\"38\" height=\"38\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"font:800 26px -apple-system,system-ui;color:#000;margin-top:16px;\">Case closed<\u002Fdiv>\n                <div style=\"font:400 16px/1.4 -apple-system,system-ui;color:#8A8A8E;margin-top:10px;\">The session was erased from both phones.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ famHasEvents }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font:600 15px -apple-system,system-ui;color:rgba(60,60,67,0.6);padding:22px 30px 8px;\">Session log<\u002Fdiv>\n              <div style=\"margin:0 16px 30px;background:#fff;border-radius:18px;overflow:hidden;\">\n                <sc-for list=\"{{ famEvents }}\" as=\"e\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:13px 18px;position:relative;\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:#C7C7CC;flex-shrink:0;\"><\u002Fspan>\n                    <span style=\"font:400 16px -apple-system,system-ui;color:#000;\">{{ e.text }}<\u002Fspan>\n                    <div style=\"position:absolute;bottom:0;left:48px;right:0;height:0.5px;background:rgba(60,60,67,0.08);\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"height:30px;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ STATUS BAR (overlay) ============ -->\n      <div style=\"position:absolute;top:0;left:0;right:0;height:46px;z-index:40;display:flex;justify-content:space-between;align-items:flex-start;padding:9px 22px 0;box-sizing:border-box;pointer-events:none;\">\n        <div style=\"display:flex;flex-direction:column;line-height:1;\">\n          <span style=\"font:700 18px -apple-system,system-ui;color:#000;letter-spacing:-0.5px;\">11:05<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:3px;font:600 12px -apple-system,system-ui;color:#000;margin-top:3px;\"><span style=\"font-size:9px;\">◀<\u002Fspan>Settings<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:7px;margin-top:5px;\">\n          <span style=\"display:flex;gap:2.5px;align-items:center;\"><i style=\"width:4px;height:4px;border-radius:50%;background:#000;display:block;\"><\u002Fi><i style=\"width:4px;height:4px;border-radius:50%;background:#000;display:block;\"><\u002Fi><i style=\"width:4px;height:4px;border-radius:50%;background:#000;display:block;\"><\u002Fi><i style=\"width:4px;height:4px;border-radius:50%;background:#000;display:block;\"><\u002Fi><\u002Fspan>\n          <svg width=\"17\" height=\"12\" sc-camel-view-box=\"0 0 17 12\" fill=\"#000\"><path d=\"M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5 5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z\"><\u002Fpath><path d=\"M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1 6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z\"><\u002Fpath><circle cx=\"8.5\" cy=\"10.5\" r=\"1.5\"><\u002Fcircle><\u002Fsvg>\n          <svg width=\"27\" height=\"13\" sc-camel-view-box=\"0 0 27 13\"><rect x=\"0.5\" y=\"0.5\" width=\"23\" height=\"12\" rx=\"3.5\" stroke=\"#000\" stroke-opacity=\"0.35\" fill=\"none\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"20\" height=\"9\" rx=\"2\" fill=\"#000\"><\u002Frect><path d=\"M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5 26.5 5.8 25.8 4.8 25 4.5Z\" fill=\"#000\" fill-opacity=\"0.4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- dynamic island -->\n      <div style=\"position:absolute;top:12px;left:50%;transform:translateX(-50%);width:122px;height:35px;border-radius:22px;background:#000;z-index:50;\"><\u002Fdiv>\n\n      <!-- home indicator -->\n      <div style=\"position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(0,0,0,0.28);z-index:45;\"><\u002Fdiv>\n      <audio ref=\"{{ audioRef }}\" autoplay=\"true\" style=\"display:none;\"><\u002Faudio>\n      <sc-if value=\"{{ audioBlocked }}\" hint-placeholder-val=\"{{ false }}\">\n        <button sc-camel-on-click=\"{{ onUnlockAudio }}\" style=\"all:unset;cursor:pointer;position:absolute;left:50%;bottom:88px;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:9px;padding:12px 22px;border-radius:24px;background:#34C759;box-shadow:0 8px 22px rgba(52,199,89,0.4);font:700 16px -apple-system,system-ui;color:#fff;white-space:nowrap;\">\n          <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z\"><\u002Fpath><\u002Fsvg>Tap to hear\n        <\u002Fbutton>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:472,&quot;height&quot;:928},&quot;faceRecognition&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Face recognition&quot;},&quot;demoSpeed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Relaxed&quot;,&quot;Normal&quot;,&quot;Snappy&quot;],&quot;default&quot;:&quot;Relaxed&quot;,&quot;tsType&quot;:&quot;'Relaxed'|'Normal'|'Snappy'&quot;,&quot;section&quot;:&quot;Staged demo&quot;},&quot;showDemoButton&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Staged demo&quot;},&quot;demoAutostart&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Staged demo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let enrolled = false;\n    try { enrolled = !!localStorage.getItem('el_face_descriptor'); } catch (e) {}\n    this.state = {\n      screen: 'home', pc: '', pcErr: false, active: null,\n      session: [], locShared: false, demo: false, erase: [], toggleLoc: true,\n      faceStatus: 'idle', faceModelReady: false, enrolled: enrolled, enrollStatus: 'idle',\n      identity: { cc: '+1', flag: '\\uD83C\\uDDFA\\uD83C\\uDDF8', number: '555 010 1234' },\n      passcode: '1234', passLen: 4,\n      contacts: [\n        { id: 'c1', name: 'Dhruv', rel: 'Brother', cc: '+1', flag: '\\uD83C\\uDDFA\\uD83C\\uDDF8', number: '555 0100 001', shareLoc: true },\n        { id: 'c2', name: 'Mom', rel: 'Mother', cc: '+1', flag: '\\uD83C\\uDDFA\\uD83C\\uDDF8', number: '555 0100 002', shareLoc: true },\n        { id: 'c3', name: 'Dad', rel: 'Father', cc: '+1', flag: '\\uD83C\\uDDFA\\uD83C\\uDDF8', number: '555 0100 003', shareLoc: false },\n      ],\n      draft: null, idDraft: null, setpc: '',\n      pickerQuery: '', countryQuery: '', pickerCtx: 'draft', prevScreen: 'setup',\n      role: null, sessionCode: '', joinCode: '', remote: null,\n      fbReady: false, fbInput: '', fbStatus: 'idle', pairStatus: 'idle',\n      liveLocation: null, voiceActive: false, audioBlocked: false,\n    };\n    this.speed = 1;\n    this.flowTimers = [];\n    this.demoTimers = [];\n    this.eraseInt = null;\n    this.videoRef = React.createRef();\n    this.audioRef = React.createRef();\n    this.stream = null;\n    this.faceLoading = false;\n    this.MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';\n    this.MATCH_THRESHOLD = 0.52;\n    this.peer = null; this.dataConn = null; this.mediaCall = null;\n    this.micStream = null; this.remotePeerId = null;\n    this.liveState = {};\n  }\n  componentDidMount() {\n    if (this.props.demoAutostart) this.runDemo();\n  }\n  componentWillUnmount() { this.stopCam(); this.teardownLive(); this.clearAll(); }\n\n  // ---- PeerJS live transport (zero-config public broker) ----\n  PEER_PREFIX() { return 'emrgncy-list-v1-'; }\n  peerOpts() {\n    return { config: { iceServers: [\n      { urls: 'stun:stun.l.google.com:19302' },\n      { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },\n      { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },\n      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }\n    ] } };\n  }\n  genCode() { return String(Math.floor(1000 + Math.random() * 9000)); }\n\n  mergeRemote(patch) {\n    const remote = Object.assign({}, this.state.remote || {}, patch);\n    const next = { remote: remote };\n    if (patch.location) next.liveLocation = patch.location;\n    this.setState(next);\n    this.onRemote(remote);\n  }\n  addEvent(text) {\n    const remote = Object.assign({}, this.state.remote || {});\n    remote.events = (remote.events || []).concat([{ text: text, at: Date.now() }]);\n    this.setState({ remote: remote });\n    return remote.events;\n  }\n  sendLive(msg) { try { if (this.dataConn && this.dataConn.open) this.dataConn.send(msg); } catch (e) {} }\n\n  handleLive(msg) {\n    if (!msg || !msg.t) return;\n    if (msg.t === 'state') this.mergeRemote(msg.data || {});\n    else if (msg.t === 'event') { const remote = Object.assign({}, this.state.remote || {}); remote.events = (remote.events || []).concat([{ text: msg.text, at: Date.now() }]); this.setState({ remote: remote }); }\n    else if (msg.t === 'location') this.mergeRemote({ location: msg.loc });\n    else if (msg.t === 'callback') { this.mergeRemote({ status: 'callback' }); }\n    else if (msg.t === 'answer') this.mergeRemote({ status: 'connected', familyOnline: true });\n    else if (msg.t === 'decline') this.mergeRemote({ status: 'declined' });\n    else if (msg.t === 'join') this.mergeRemote({ familyOnline: true });\n    else if (msg.t === 'closed') { this.mergeRemote({ status: 'closed' }); this.stopVoice(); }\n  }\n\n  // borrowed reacts to family messages\n  onRemote(v) {\n    if (!v || this.state.role !== 'borrowed') return;\n    const scr = this.state.screen;\n    if (v.status === 'callback' && (scr === 'hold' || scr === 'case')) this.setState({ screen: 'callback' });\n  }\n\n  wireDataConn(conn) {\n    this.dataConn = conn;\n    const onOpen = () => {\n      if (this.state.role === 'family') { this.sendLive({ t: 'join' }); }\n      this.setState(s => ({ remote: Object.assign({}, s.remote || {}, { peerLinked: true }) }));\n    };\n    if (conn.open) { onOpen(); } else { conn.on('open', onOpen); }\n    conn.on('data', (msg) => this.handleLive(msg));\n    conn.on('close', () => this.setState(s => ({ remote: Object.assign({}, s.remote || {}, { peerLinked: false }) })));\n    conn.on('error', () => {});\n  }\n\n  // ---- role + pairing ----\n  openLive() { this.setState({ screen: 'role' }); }\n\n  chooseRole(role) {\n    if (!window.Peer) { this.setState({ pairStatus: 'nolib', role: role, screen: 'pair' }); return; }\n    if (role === 'borrowed') {\n      const code = this.genCode();\n      this.teardownLive();\n      this.setState({ role: 'borrowed', sessionCode: code, screen: 'pair', pairStatus: 'hosting', remote: null });\n      const peer = new Peer(this.PEER_PREFIX() + code, this.peerOpts());\n      this.peer = peer;\n      peer.on('open', () => this.setState({ pairStatus: 'waiting' }));\n      peer.on('connection', (conn) => { this.remotePeerId = conn.peer; this.wireDataConn(conn); this.mergeRemote({ familyOnline: true }); });\n      peer.on('call', (call) => this.answerIncomingMedia(call));\n      peer.on('error', (e) => { if (('' + e).indexOf('unavailable-id') > -1) { this.chooseRole('borrowed'); } else { this.setState({ pairStatus: 'peererr' }); } });\n    } else {\n      this.teardownLive();\n      this.setState({ role: 'family', joinCode: '', screen: 'pair', pairStatus: 'idle', remote: null });\n    }\n  }\n\n  joinSession() {\n    const code = (this.state.joinCode || '').trim();\n    if (code.length < 4) { this.setState({ pairStatus: 'short' dioRef.current; if (a) { try { a.play(); } catch (e) {} } this.setState({ audioBlocked: false }); }\n  async placeVoiceCall() {\n    if (!this.peer || !this.remotePeerId) return;\n    const mic = await this.getMic();\n    if (!mic) return;\n    try { const call = this.peer.call(this.remotePeerId, mic); this.mediaCall = call; call.on('stream', (rs) => this.attachRemoteAudio(rs)); } catch (e) {}\n  }\n  async answerIncomingMedia(call) {\n    const mic = await this.getMic();\n    this.mediaCall = call;\n    try { call.answer(mic || undefined); } catch (e) {}\n    call.on('stream', (rs) => this.attachRemoteAudio(rs));\n  }\n  stopVoice() {\n    try { if (this.mediaCall) this.mediaCall.close(); } catch (e) {}\n    try { if (this.micStream) this.micStream.getTracks().forEach(t => t.stop()); } catch (e) {}\n    this.mediaCall = null; this.micStream = null;\n    const a = this.audioRef && this.audioRef.current; if (a) a.srcObject = null;\n    this.setState({ voiceActive: false, audioBlocked: false });\n  }\n\n  // ---- family actions ----\n  famAnswer() { this.sendLive({ t: 'answer' }); this.sendLive({ t: 'event', text: 'Answered the call' }); this.mergeRemote({ status: 'connected' }); this.addEvent('Answered the call'); }\n  famDecline() { this.sendLive({ t: 'decline' }); this.mergeRemote({ status: 'declined' }); }\n  async famShareLoc() {\n    const send = (lat, lng, label) => { const loc = { lat, lng, label, at: Date.now() }; this.sendLive({ t: 'location', loc: loc }); this.sendLive({ t: 'event', text: 'Shared live location' }); this.mergeRemote({ location: loc }); this.addEvent('Shared live location'); };\n    if (navigator.geolocation) {\n      navigator.geolocation.getCurrentPosition(\n        (pos) => send(pos.coords.latitude, pos.coords.longitude, 'Live GPS'),\n        () => { const p = this.manualPin(); if (p) send(p.lat, p.lng, 'Manual pin'); },\n        { enableHighAccuracy: true, timeout: 8000 }\n      );\n    } else { const p = this.manualPin(); if (p) send(p.l cted ? 'Live test \\u00B7 family connected' : 'Live two-phone test',\n      liveDotColor: liveConnected ? '#34C759' : '#FF9F0A',\n      liveDotRing: liveConnected ? 'rgba(52,199,89,0.25)' : 'transparent',\n      onOpenLive: () => { this.stopDemo(); this.openLive(); },\n\n      // live: role picker\n      onLiveHome: () => this.setState({ screen: 'home' }),\n      onRoleBorrowed: () => this.chooseRole('borrowed'),\n      onRoleFamily: () => this.chooseRole('family'),\n      onOpenFbSetup: () => this.setState({ screen: 'fbSetup' }),\n      fbLinkLabel: 'How it works \\u00B7 needs internet on both phones',\n      fbLinkColor: '#8A8A8E',\n\n      // live: info screen\n      onBackRole: () => this.setState({ screen: 'role' }),\n\n      // live: pair\n      sessionCode: this.state.sessionCode,\n      joinCode: this.state.joinCode,\n      pairIsBorrowed: this.state.role === 'borrowed',\n      pairIsFamily: this.state.role === 'family',\n      pairTitle: this.state.role === 'borrowed' ? 'Your session code' : 'Join a session',\n      pairStatusText: this.state.role === 'borrowed'\n        ? (rem.familyOnline ? 'Family member connected.' : (pairStatusB[this.state.pairStatus] || 'Waiting for your family member to join\\u2026'))\n        : (pairStatusF[this.state.pairStatus] || ''),\n      pairStatusColor: (this.state.pairStatus === 'notfound' || this.state.pairStatus === 'short') ? '#FF3B30' : (rem.familyOnline ? '#34C759' : '#8A8A8E'),\n      onJoinInput: (e) => this.setState({ joinCode: e.target.value.replace(/[^0-9]/g, '') }),\n      onJoinSession: () => this.joinSession(),\n      joinBtnBg: (this.state.joinCode || '').length >= 4 ? '#007AFF' : '#B4D4FF',\n\n      // live: family hub\n      famStatusText: famClosed ? 'Case closed' : famConnected ? 'Connected \\u2014 helping recover' : famRinging ? 'Incoming request' : 'Waiting for the borrowed phone\\u2026',\n      famDotColor: famClosed ? '#8A8A8E' : famConnected ? '#34C759' : famRinging ? '#FF9F0A' : '#C7C7CC',\n      fam
